name: CI

on:
  push:
    branches: [main]
  pull_request:

# Batalkan run lama pada ref yang sama saat ada push baru.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Typecheck · Lint · Test · Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Enable corepack (pnpm)
        run: corepack enable
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm
      - name: Install (frozen lockfile)
        run: pnpm install --frozen-lockfile
      - name: Typecheck
        run: pnpm typecheck
      - name: Lint
        run: pnpm lint
      - name: Format check
        run: pnpm format:check
      - name: Unit test
        run: pnpm test
      - name: Build
        run: pnpm build

  test-isolation:
    name: Tenant isolation (RLS)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Enable corepack (pnpm)
        run: corepack enable
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm
      - name: Install (frozen lockfile)
        run: pnpm install --frozen-lockfile
      # Postgres asli in-process (pglite) — tidak butuh service container.
      - name: Tenant isolation tests
        run: pnpm test:isolation

  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: 8.21.2
        run: |
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /tmp gitleaks
          sudo mv /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version
      # Scan working tree (bukan history): commit lama memuat anon/publishable
      # key yang public-by-design; .gitleaks.toml meng-allowlist .env.example.
      - name: Detect secrets
        run: gitleaks detect --no-git --redact --verbose --exit-code 1

  semgrep:
    name: Static analysis (semgrep)
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4
      - name: Semgrep scan
        run: semgrep scan --config auto --error --disable-version-check

  audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Enable corepack (pnpm)
        run: corepack enable
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm
      - name: Install (frozen lockfile)
        run: pnpm install --frozen-lockfile
      # Blokir hanya pada kerentanan dependency PRODUKSI (yang ter-ship).
      # Advisory pada tooling dev (vite/vitest/esbuild) tidak memblokir CI dan
      # diurus oleh Dependabot.
      - name: Audit production deps (fail on high/critical)
        run: pnpm audit --prod --audit-level=high
